{% extends 'base.html' %}

{% block title %}Book Table - Little Lemon Web Application{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
    <div class="bg-lemonGreen text-white p-6 text-center space-y-2">
        <h1 class="text-2xl font-serif font-bold text-lemonYellow">Reserve a Table</h1>
        <p class="text-xs text-gray-200">Secure your dining slot today.</p>
    </div>
    <div class="p-6">
        <form class="space-y-4" onsubmit="event.preventDefault(); alert('Table booked successfully!');">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Your Name</label>
                <input type="text" required placeholder="John Doe" class="w-full px-4 py-2 rounded-lg border border-gray-300 outline-none text-sm focus:ring-2 focus:ring-lemonGreen">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Guests</label>
                <select class="w-full px-4 py-2 rounded-lg border border-gray-300 outline-none text-sm focus:ring-2 focus:ring-lemonGreen">
                    <option>1 Guest</option>
                    <option selected>2 Guests</option>
                    <option>3 Guests</option>
                    <option>4+ Guests</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Date</label>
                <input type="date" required class="w-full px-4 py-2 rounded-lg border border-gray-300 outline-none text-sm focus:ring-2 focus:ring-lemonGreen">
            </div>
            <button type="submit" class="w-full bg-lemonYellow hover:bg-yellow-500 text-lemonGreen font-bold py-2.5 rounded-lg shadow uppercase text-sm tracking-wider">
                Submit Reservation
            </button>
        </form>
    </div>
</div>
{% endblock %}
